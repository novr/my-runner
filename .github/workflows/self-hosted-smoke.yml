name: Self-hosted smoke

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/self-hosted-smoke.yml"

jobs:
  smoke:
    runs-on: [self-hosted, macos, tart, xcode]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Show environment
        run: |
          set -euo pipefail
          sw_vers
          uname -m
          xcodebuild -version
          xcrun simctl list runtimes | head -20
          echo "Runner name: ${RUNNER_NAME:-unknown}"
          test -d scripts
          test -f scripts/spawn.sh
          bash -n scripts/spawn.sh
          bash -n scripts/pool.sh
          bash -n runner/bootstrap.sh
