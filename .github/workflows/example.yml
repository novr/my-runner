name: iOS Build Example

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    # Target this runner pool using the labels defined in RUNNER_LABELS
    runs-on: [self-hosted, macos, tart, xcode]
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Show environment
        run: |
          sw_vers
          xcodebuild -version
          xcrun simctl list runtimes

      - name: Build
        run: xcodebuild -scheme YourScheme -destination 'generic/platform=iOS' build
